<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Javier Estrada | Luxury Real Estate - Ciudad Juárez</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollToPlugin.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <style>
        /* ========== ESTILOS ORIGINALES (NO SE HA MODIFICADO NADA DEL CARRUSEL NI CURSOR) ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-deep: #F5F2ED;
            --bg-primary: #FAF8F4;
            --bg-secondary: #EFEBE5;
            --bg-card: #FFFFFF;
            --gold: #C6A15B;
            --gold-light: #D9BA7A;
            --gold-dark: #A8843E;
            --text-primary: #2C2A28;
            --text-secondary: #5C5955;
            --text-muted: #8A8680;
            --border-subtle: rgba(198, 161, 91, 0.2);
            --border-gold: rgba(198, 161, 91, 0.35);
            --shadow-sm: 0 4px 20px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            --shadow-elevated: 0 30px 60px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            line-height: 1.5;
            overflow-x: hidden;
        }

        @media (min-width: 1024px) {
            body { cursor: none; }
            .custom-cursor {
                width: 8px; height: 8px; background: var(--gold); border-radius: 50%;
                position: fixed; pointer-events: none; z-index: 99999;
                transform: translate(-50%, -50%); transition: width 0.2s, height 0.2s;
            }
            .custom-cursor-trail {
                width: 40px; height: 40px; border: 1.5px solid rgba(198, 161, 91, 0.4);
                border-radius: 50%; position: fixed; pointer-events: none; z-index: 99998;
                transform: translate(-50%, -50%); transition: width 0.2s, height 0.2s;
            }
            .custom-cursor.hover { width: 40px; height: 40px; background: rgba(198, 161, 91, 0.15); }
            .custom-cursor-trail.hover { width: 60px; height: 60px; }
        }

        .luxury-loader { position: fixed; inset: 0; background: var(--bg-primary); z-index: 999999; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 24px; }
        .loader-logo { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 600; letter-spacing: 6px; color: var(--text-primary); }
        .loader-logo span { color: var(--gold); }
        .loader-progress { width: 280px; height: 2px; background: rgba(198,161,91,0.2); border-radius: 10px; overflow: hidden; }
        .loader-progress-bar { width: 0%; height: 100%; background: var(--gold); transition: width 0.3s; }

        /* Navbar */
        .navbar {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            width: calc(100% - 40px); max-width: 1280px; z-index: 1000; padding: 12px 28px;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255, 255, 255, 0.96); backdrop-filter: blur(12px);
            border-radius: 60px; border: 1px solid rgba(198, 161, 91, 0.15); box-shadow: var(--shadow-sm);
        }
        .navbar.glass { background: rgba(0, 0, 0, 0.2); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .navbar.glass .navbar-logo,
        .navbar.glass .nav-links a { color: white !important; text-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        .navbar.glass .nav-links a::after { background: white; }
        .navbar.scrolled { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(20px); top: 12px; border-color: rgba(198,161,91,0.25); }
        .navbar.scrolled .navbar-logo,
        .navbar.scrolled .nav-links a { color: var(--text-primary) !important; text-shadow: none; }
        .navbar.scrolled .nav-links a::after { background: var(--gold); }
        
        .navbar-logo { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 600; text-decoration: none; color: var(--text-primary); transition: color 0.3s; display: flex; align-items: center; gap: 8px; }
        .navbar-logo img { height: 32px; width: auto; border-radius: 8px; }
        .navbar-logo span { color: var(--gold); }
        .nav-links { display: flex; gap: 32px; align-items: center; }
        .nav-links a {
            text-decoration: none; font-size: 13px; font-weight: 500; letter-spacing: 0.04em;
            transition: all 0.3s; position: relative; text-transform: uppercase; color: var(--text-primary);
        }
        .nav-links a::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 2px; background: var(--gold); transition: width 0.3s; }
        .nav-links a:hover::after { width: 100%; }
        .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; padding: 8px; }
        .hamburger span { width: 24px; height: 2px; background: var(--text-primary); border-radius: 2px; transition: 0.3s; }

        @media (max-width: 768px) {
            .navbar { width: calc(100% - 20px); padding: 10px 20px; }
            .nav-links {
                position: fixed; top: 0; right: -100%; width: 70%; max-width: 280px;
                height: 100vh; background: rgba(28, 28, 30, 0.98); backdrop-filter: blur(40px);
                flex-direction: column; justify-content: center; gap: 30px; transition: right 0.4s;
                border-left: 1px solid rgba(198,161,91,0.3); z-index: 999; padding-top: 80px;
            }
            .nav-links a { color: #fff !important; font-size: 16px; }
            .nav-links a::after { background: var(--gold); }
            .nav-links.active { right: 0; }
            .hamburger { display: flex; }
            .nav-links .close-menu { display: block; position: absolute; top: 20px; right: 20px; background: none; border: none; color: var(--gold); font-size: 28px; cursor: pointer; }
            .custom-cursor, .custom-cursor-trail { display: none; }
        }

        /* Hero */
        .hero-section { position: relative; height: 100vh; min-height: 700px; display: flex; align-items: center; justify-content: center; overflow: hidden; background: var(--bg-deep); }
        .hero-image-container { position: absolute; inset: 0; z-index: 0; }
        .hero-video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.85); }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(135deg, rgba(0,0,0,0.3), rgba(0,0,0,0.1)); z-index: 1; }
        .hero-content { position: relative; z-index: 3; text-align: center; max-width: 650px; width: 90%; padding: 0 20px; opacity: 0; transform: translateY(30px); display: flex; flex-direction: column; align-items: center; gap: 28px; }
        .hero-cta-group { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; width: 100%; }
        .btn-gold-hero { background: rgba(198, 161, 91, 0.95); backdrop-filter: blur(8px); color: white; font-weight: 600; border: 1px solid rgba(255,255,255,0.2); border-radius: 50px; padding: 16px 38px; cursor: pointer; transition: all 0.3s; font-size: 15px; display: inline-flex; align-items: center; gap: 10px; }
        .btn-outline-hero { background: rgba(0,0,0,0.3); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.4); color: white; font-weight: 600; border-radius: 50px; padding: 14px 36px; cursor: pointer; transition: all 0.3s; font-size: 15px; }
        .btn-outline-hero:hover, .btn-gold-hero:hover { transform: translateY(-3px); background: var(--gold); border-color: var(--gold); }
        .scroll-indicator { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; animation: bounce 2s infinite; }
        @keyframes bounce { 0%,100% { transform: translateX(-50%) translateY(0); opacity: 0.6; } 50% { transform: translateX(-50%) translateY(-8px); opacity: 1; } }
        .scroll-indicator span { font-size: 10px; letter-spacing: 2px; color: white; text-transform: uppercase; }
        .scroll-indicator .line { width: 1px; height: 40px; background: linear-gradient(to bottom, white, transparent); }

        /* Secciones */
        .section-container { max-width: 1280px; margin: 0 auto; padding: 80px 40px; }
        .section-header { text-align: center; margin-bottom: 60px; opacity: 0; transform: translateY(30px); }
        .section-label { font-size: 13px; letter-spacing: 0.22em; color: var(--gold); text-transform: uppercase; margin-bottom: 16px; font-weight: 600; }
        .section-title {
            font-size: clamp(2.2rem, 5vw, 3.5rem);
            font-weight: 700;
            margin-bottom: 16px;
            font-family: 'Playfair Display', serif;
            color: var(--text-primary);
            letter-spacing: 0.02em;
        }
        .text-gold { color: var(--gold); }

        /* Carrusel fraccionamientos */
        .developments-section { padding: 60px 0; background: linear-gradient(135deg, var(--bg-primary), var(--bg-deep)); }
        .developments-container { max-width: 1400px; margin: 0 auto; padding: 0 40px; }
        .developments-swiper { width: 100%; padding: 20px 0 40px; }
        .development-card { background: var(--bg-card); border-radius: 24px; overflow: hidden; box-shadow: var(--shadow-sm); transition: all 0.4s; margin: 0 15px; border: 1px solid var(--border-subtle); }
        .development-card:hover { transform: translateY(-8px); box-shadow: var(--shadow-lg); border-color: var(--border-gold); }
        .development-image { height: 220px; overflow: hidden; }
        .development-image img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s; }
        .development-card:hover .development-image img { transform: scale(1.05); }
        .development-content { padding: 24px; text-align: center; }
        .development-content h3 { font-family: 'Playfair Display', serif; font-size: 1.3rem; margin-bottom: 8px; color: var(--text-primary); }
        .development-location { color: var(--gold); font-size: 0.8rem; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .development-price { font-size: 1rem; font-weight: 500; color: var(--gold-dark); margin-bottom: 16px; }
        .development-features { display: flex; justify-content: center; gap: 16px; margin-bottom: 20px; font-size: 0.75rem; color: var(--text-muted); }
        .btn-dev { background: rgba(198,161,91,0.12); color: var(--gold-dark); border: 1px solid rgba(198,161,91,0.3); padding: 10px 24px; border-radius: 40px; font-weight: 500; cursor: pointer; transition: all 0.3s; width: 100%; }
        .btn-dev:hover { background: var(--gold); color: white; border-color: var(--gold); }
        .swiper-pagination-bullet-active { background: var(--gold) !important; }
        .swiper-button-next, .swiper-button-prev { color: var(--gold) !important; background: rgba(255,255,255,0.8); width: 38px; height: 38px; border-radius: 50%; }

        /* Banners del catálogo */
        .dev-banner { position: relative; height: 320px; border-radius: 24px; overflow: hidden; margin-bottom: 30px; box-shadow: var(--shadow-md); }
        .dev-banner img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.6); }
        .dev-banner-content { position: absolute; bottom: 0; left: 0; right: 0; padding: 32px; color: white; display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 16px; }
        .dev-banner-content h3 { font-family: 'Playfair Display', serif; font-size: 2rem; }
        .dev-price-badge { background: var(--gold); color: white; padding: 12px 24px; border-radius: 40px; font-size: 1.3rem; font-weight: 700; box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
        .dev-properties-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 24px; margin-bottom: 60px; }

        /* Catálogo de propiedades */
        .property-card { background: var(--bg-card); border-radius: 28px; overflow: hidden; transition: all 0.5s; cursor: pointer; border: 1px solid var(--border-subtle); opacity: 0; transform: translateY(40px); box-shadow: var(--shadow-sm); }
        .property-card:hover { transform: translateY(-10px); border-color: var(--border-gold); box-shadow: var(--shadow-elevated); }
        .property-card-image {
            width: 100%;
            height: auto;
            object-fit: contain;
            background: var(--bg-secondary);
            display: block;
            transition: transform 0.8s;
            max-height: 500px;
        }
        @media (max-width: 768px) {
            .property-card-image { max-height: 350px; }
        }
        .property-card:hover .property-card-image { transform: scale(1.03); }
        .property-card-content { padding: 24px; }
        @media (max-width: 480px) {
            .property-card-content { padding: 16px; }
            .property-price { font-size: 1.2rem !important; }
            .property-card-content h3 { font-size: 1rem !important; }
        }
        .property-price { font-size: 1.5rem; font-weight: 700; color: var(--gold-dark); margin-bottom: 8px; }
        .property-card-content h3 { font-size: 1.2rem; font-weight: 600; margin-bottom: 8px; color: var(--text-primary); }
        .property-specs { display: flex; gap: 16px; margin: 12px 0; font-size: 0.8rem; color: var(--text-secondary); flex-wrap: wrap; }
        .property-buttons { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
        .property-buttons button { flex: 1; padding: 10px; border-radius: 40px; font-weight: 500; cursor: pointer; font-size: 13px; transition: all 0.2s; border: none; }
        .btn-wa { background: #25D366; color: white; }
        .btn-details { background: var(--gold); color: white; }
        .btn-details:hover, .btn-wa:hover { transform: translateY(-2px); filter: brightness(1.05); }
        .btn-outline-solid { background: var(--gold); color: white; border: none; border-radius: 50px; padding: 14px 36px; cursor: pointer; font-weight: 600; transition: all 0.3s; font-size: 14px; display: inline-flex; align-items: center; gap: 10px; }
        .btn-outline-solid:hover { background: var(--gold-light); transform: translateY(-2px); }

        /* ========== MODAL DE PROPIEDAD (NO SE HA TOCADO) ========== */
        .lightbox-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); z-index: 3000; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: all 0.4s; }
        .lightbox-overlay.active { opacity: 1; visibility: visible; }
        .modal-container { background: var(--bg-card); border-radius: 24px; max-width: 1100px; width: 95%; max-height: 90vh; position: relative; display: flex; flex-direction: column; overflow: hidden; }
        @media (min-width: 769px) { .modal-container { border-radius: 48px; } }
        .modal-close { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.7); border: none; width: 40px; height: 40px; border-radius: 50%; color: white; font-size: 24px; cursor: pointer; z-index: 20; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .modal-close:hover { background: rgba(0,0,0,0.9); transform: scale(1.05); }
        .modal-gallery { flex-shrink: 0; width: 100%; position: relative; }
        @media (min-width: 769px) { .modal-gallery { height: 50vh; min-height: 400px; } }
        @media (max-width: 768px) { .modal-gallery { height: 40vh; min-height: 250px; } }
        .modal-details { flex: 1; overflow-y: auto; padding: 28px 32px; -webkit-overflow-scrolling: touch; }
        @media (max-width: 768px) { .modal-details { padding: 24px 20px; } }

        /* Flechas del Swiper (no modificadas) */
        .propertySwiperModal .swiper-button-next,
        .propertySwiperModal .swiper-button-prev {
            display: flex !important; align-items: center; justify-content: center;
            width: 50px; height: 50px; border-radius: 50%;
            background: rgba(198, 161, 91, 0.85); backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px); border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 6px 18px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.2) inset;
            color: #fff; transition: all 0.3s ease; right: 16px; left: auto;
        }
        .propertySwiperModal .swiper-button-prev { right: auto; left: 16px; }
        .propertySwiperModal .swiper-button-next::after,
        .propertySwiperModal .swiper-button-prev::after { font-size: 24px; font-weight: bold; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        @media (min-width: 1024px) {
            .propertySwiperModal .swiper-button-next:hover,
            .propertySwiperModal .swiper-button-prev:hover { background: rgba(198, 161, 91, 0.95); border-color: #fff; box-shadow: 0 8px 24px rgba(0,0,0,0.5); transform: scale(1.08); }
        }
        @media (max-width: 768px) {
            .propertySwiperModal .swiper-button-next,
            .propertySwiperModal .swiper-button-prev { width: 44px; height: 44px; }
        }

        /* Detalles premium (no modificado) */
        .modal-property-name { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 8px; color: var(--text-primary); }
        .modal-property-price { font-size: 2.8rem; font-weight: 700; background: linear-gradient(135deg, var(--gold-dark), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin: 16px 0 12px; line-height: 1.2; }
        .modal-property-desc { font-size: 1.1rem; color: var(--text-secondary); margin-bottom: 20px; line-height: 1.7; }
        .modal-specs-grid { display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: 24px; }
        .modal-spec-card { background: linear-gradient(145deg, rgba(198,161,91,0.08), rgba(198,161,91,0.02)); border: 1px solid rgba(198,161,91,0.25); border-radius: 16px; padding: 16px 20px; display: flex; align-items: center; gap: 12px; min-width: 140px; flex: 1; transition: all 0.3s; }
        .modal-spec-card i { font-size: 1.5rem; color: var(--gold); }
        .modal-spec-card span { font-weight: 600; color: var(--text-primary); }
        .modal-amenities-title { font-weight: 600; color: var(--text-primary); margin-bottom: 10px; font-size: 1rem; letter-spacing: 0.02em; }
        .modal-amenities-list { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 28px; }
        .modal-amenity-badge { background: rgba(198,161,91,0.12); border: 1px solid rgba(198,161,91,0.3); border-radius: 40px; padding: 8px 18px; font-size: 0.85rem; color: var(--gold-dark); font-weight: 500; }
        @media (max-width: 768px) {
            .modal-property-name { font-size: 1.6rem; }
            .modal-property-price { font-size: 2.2rem; }
            .modal-spec-card { min-width: 120px; padding: 12px 14px; }
        }

        /* ========== NUEVO: FORMULARIO DE CONTACTO PREMIUM ========== */
        .contact-modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
            z-index: 4000; display: flex; align-items: center; justify-content: center;
            opacity: 0; visibility: hidden; transition: 0.3s;
        }
        .contact-modal-overlay.active { opacity: 1; visibility: visible; }
        .contact-modal {
            background: var(--bg-card); border-radius: 28px; max-width: 500px; width: 90%;
            padding: 32px; box-shadow: var(--shadow-elevated); position: relative;
        }
        .contact-modal h3 { font-family: 'Playfair Display', serif; font-size: 1.8rem; margin-bottom: 24px; color: var(--text-primary); }
        .contact-modal .form-group { margin-bottom: 20px; }
        .contact-modal label { display: block; font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
        .contact-modal input, .contact-modal textarea {
            width: 100%; padding: 12px 16px; border: 1px solid var(--border-subtle);
            border-radius: 14px; background: var(--bg-secondary); font-family: 'Inter', sans-serif;
            font-size: 14px; color: var(--text-primary); transition: 0.2s;
        }
        .contact-modal input:focus, .contact-modal textarea:focus { outline: none; border-color: var(--gold); background: white; }
        .contact-modal .btn-submit { background: var(--gold); color: white; border: none; border-radius: 50px; padding: 14px; font-weight: 600; cursor: pointer; width: 100%; transition: 0.2s; }
        .contact-modal .btn-submit:hover { background: var(--gold-light); }

        /* El resto de estilos (agente, testimonios, FAQ, admin, etc.) permanecen igual */
        .agent-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; }
        @media (max-width: 768px) { .agent-grid { grid-template-columns: 1fr; gap: 30px; } }
        .agent-image { border-radius: 28px; overflow: hidden; box-shadow: var(--shadow-elevated); width: 100%; max-width: 450px; margin: 0 auto; }
        @media (max-width: 768px) { .agent-image { max-width: 100%; border-radius: 20px; } }
        .agent-image img { width: 100%; height: auto; display: block; object-fit: cover; aspect-ratio: 1 / 1; }
        @media (min-width: 769px) { .agent-image img { aspect-ratio: auto; } }
        .agent-text h2 { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 16px; }
        @media (max-width: 768px) { .agent-text h2 { font-size: 1.6rem; text-align: center; } .agent-text .section-label { text-align: center; } }
        .agent-stats { display: flex; gap: 24px; margin-top: 30px; flex-wrap: wrap; justify-content: center; }
        .agent-stat { text-align: center; padding: 20px; background: rgba(198,161,91,0.06); border-radius: 20px; flex: 1; min-width: 100px; }
        .agent-stat-number { font-size: 2rem; font-weight: 700; color: var(--gold-dark); font-family: 'Playfair Display', serif; }
        @media (max-width: 768px) { .agent-stat-number { font-size: 1.6rem; } }

        .testimonials-swiper { width: 100%; padding: 20px 0 50px; }
        .testimonial-card { background: var(--bg-card); border-radius: 24px; padding: 28px; margin: 0 15px; border: 1px solid var(--border-subtle); transition: all 0.3s; }
        .testimonial-card:hover { transform: translateY(-5px); border-color: var(--border-gold); }
        .testimonial-header { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; }

    <script>
        // ============================================================

        const HERO_MOBILE_URL  = 'c.png';

        // ============================================================
        //  🔵 CAMBIA AQUÍ LA IMAGEN DEL HERO PARA COMPUTADORA
        // ============================================================
        const HERO_DESKTOP_URL = 'hero.png';

        // ============ CONFIGURACIÓN INICIAL ============
        let siteConfig = JSON.parse(localStorage.getItem('javier_site_config')) || { 
            adminName: 'Javier Estrada', 
            adminTitle: 'Executive', 
            logoUrl: ''
        };

        // ---- Lenis seguro ----
        let lenis = null;
        try {
            lenis = new Lenis({ 
                duration: 1.2, 
                easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)), 
                smooth: true 
            });
            function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
            requestAnimationFrame(raf);
            window.scrollTo = (options) => { 
                if (typeof options === 'number') lenis.scrollTo(options, { offset: 0 }); 
                else if (options.top !== undefined) lenis.scrollTo(options.top, { offset: 0 }); 
            };
        } catch (e) {
            window.scrollTo = (options) => {
                if (typeof options === 'number') window.scrollTo(0, options);
                else if (options.top !== undefined) window.scrollTo(0, options.top);
            };
        }

        // ========== HERO RESPONSIVE DINÁMICO ==========
        let heroMediaQuery = null;
        function updateHeroImage() {
            const heroImg = document.querySelector('.hero-video');
            if (!heroImg) return;
            heroImg.src = (window.innerWidth <= 768) ? HERO_MOBILE_URL : HERO_DESKTOP_URL;
        }
        function setupHeroResponsive() {
            if (heroMediaQuery) return;
            heroMediaQuery = window.matchMedia('(max-width: 768px)');
            heroMediaQuery.addEventListener('change', updateHeroImage);
        }
        function cleanupHeroResponsive() {
            if (heroMediaQuery) {
                heroMediaQuery.removeEventListener('change', updateHeroImage);
                heroMediaQuery = null;
            }
        }

        let developmentsData = JSON.parse(localStorage.getItem('javier_developments')) || [
            { id: 'montevalle', name: 'Montevalle Residencial', location: 'Zona Poniente, Cd. Juárez', priceBase: 'Desde $4,800,000 MXN', image: 'https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=600' },
            { id: 'cerrada-castano', name: 'Cerrada Castaño', location: 'Noroeste, Cd. Juárez', priceBase: 'Desde $7,500,000 MXN', image: 'https://images.unsplash.com/photo-1600566753190-17f0baa2a6c3?w=600' },
            { id: 'amberes', name: 'Amberes', location: 'Norte, Cd. Juárez', priceBase: 'Desde $8,900,000 MXN', image: 'https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=600' },
            { id: 'sendareal', name: 'Sendareal', location: 'Zona Oriente, Cd. Juárez', priceBase: 'Desde $5,500,000 MXN', image: 'https://images.unsplash.com/photo-1600210491892-03d54c0aaf87?w=600' },
            { id: 'cerradas-santiago', name: 'Cerradas de Santiago', location: 'Sur, Cd. Juárez', priceBase: 'Desde $9,200,000 MXN', image: 'https://images.unsplash.com/photo-1600566753086-00f18f6b0050?w=600' },
            { id: 'rincon-marquez', name: 'Rincón del Márquez', location: 'Poniente Premium, Cd. Juárez', priceBase: 'Desde $6,300,000 MXN', image: 'https://images.unsplash.com/photo-1600573472550-8090b5e0745e?w=600' }
        ];

        function saveDevelopments() { localStorage.setItem('javier_developments', JSON.stringify(developmentsData)); }

        const DB_NAME = 'javier_images_db';
        const DB_STORE = 'images';
        let db = null;
        const imageCache = new Map();

        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(DB_STORE)) {
                        db.createObjectStore(DB_STORE, { keyPath: 'id' });
                    }
                };
                request.onsuccess = (e) => { db = e.target.result; resolve(db); };
                request.onerror = (e) => reject(e.target.error);
            });
        }

        async function storeImageInDB(id, dataUrl) {
            if (!db) await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(DB_STORE, 'readwrite');
                const store = tx.objectStore(DB_STORE);
                store.put({ id, dataUrl });
                tx.oncomplete = () => resolve();
                tx.onerror = (e) => reject(e.target.error);
            });
        }

        async function getImageFromDB(id) {
            if (!db) await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(DB_STORE, 'readonly');
                const store = tx.objectStore(DB_STORE);
                const request = store.get(id);
                request.onsuccess = () => resolve(request.result ? request.result.dataUrl : null);
                request.onerror = (e) => reject(e.target.error);
            });
        }

        async function loadAllImagesIntoCache() {
            if (!db) await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(DB_STORE, 'readonly');
                const store = tx.objectStore(DB_STORE);
                const request = store.getAll();
                request.onsuccess = () => {
                    (request.result || []).forEach(item => imageCache.set(item.id, item.dataUrl));
                    resolve();
                };
                request.onerror = (e) => reject(e.target.error);
            });
        }

        function getImageSrc(imgObj) {
            if (!imgObj) return 'https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=800';
            if (typeof imgObj === 'string') return imgObj;
            const src = imgObj.src;
            if (src && src.startsWith('data:')) return src;
            return imageCache.get(src) || 'https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=800';
        }

        let properties = JSON.parse(localStorage.getItem('javier_properties'));
        const devCounts = { 'Montevalle Residencial': 4, 'Cerrada Castaño': 3, 'Amberes': 3, 'Sendareal': 3, 'Cerradas de Santiago': 1, 'Rincón del Márquez': 3 };

        if (!properties || properties.length === 0) {
            properties = [];
            const modelos = ['Villa', 'Residencia', 'Casa', 'Penthouse', 'Hacienda'];
            for (let dev of developmentsData) {
                const cnt = devCounts[dev.name] || 3;
                for (let i = 1; i <= cnt; i++) {
                    const precios = [4800000, 6200000, 8900000, 7200000, 13500000, 9500000, 5500000, 11200000];
                    const price = precios[(dev.id.length + i) % precios.length];

                if (count < targetCount) {
                    for (let i = count + 1; i <= targetCount; i++) {

        const API_BASE = 'https://backend-javier.onrender.com';

        async function apiRequest(endpoint, options = {}) {
            const url = `${API_BASE}${endpoint}`;
            const headers = {
                ...(authToken ? { 'Authorization': `Bearer ${authToken}` } : {})
            };
            if (!(options.body instanceof FormData)) {
                headers['Content-Type'] = 'application/json';
            }
            const config = { ...options, headers: { ...headers, ...(options.headers || {}) } };
            const response = await fetch(url, config);
            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                throw new Error(errorData.message || `Error ${response.status}`);
            }
            return await response.json();
        }

        async function saveData() {
    try {
        // 🔥 SOLO BACKEND (NO localStorage)
        
        if (authToken) {

            // Propiedades (mejor: una por una si tienes nuevas)
            for (const property of properties) {
                if (!property._id) {
                    await apiRequest('/api/properties', {
                        method: 'POST',
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(property)
                    });
                }
            }

            // Leads
            for (const lead of leads) {
                if (!lead._id) {
                    await apiRequest('/api/leads', {
                        method: 'POST',
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(lead)
                    });
                }
            }

            // Developments
            for (const dev of (developmentsData || [])) {
                if (!dev._id) {
                    await apiRequest('/api/developments', {
                        method: 'POST',
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(dev)
                    });
                }
            }

        }

        console.log("✅ Datos sincronizados con backend");
        showToast("Datos guardados correctamente");

    } catch (error) {
        console.log("❌ Error en saveData:", error);
        showToast("Error al guardar datos");
    }
}

                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })

                activeDrawer = null;
                document.body.style.overflow = '';
            }
            const overlay = document.createElement('div'); overlay.className = 'drawer-overlay';
            const drawer = document.createElement('div'); drawer.className = 'drawer';
            drawer.innerHTML = `<div class="drawer-header"><h3>${title}</h3><button class="drawer-close" onclick="closeDrawer()">✕</button></div><div class="drawer-body"><form id="drawerForm">${formHtml}</form></div>`;
            document.body.appendChild(overlay);
            document.body.appendChild(drawer);
            document.body.style.overflow = 'hidden';

            const scrollArea = drawer.querySelector('.form-scroll');
            if (scrollArea) {
                scrollArea.style.overflowY = 'auto';
                scrollArea.style.maxHeight = '100%';
                scrollArea.style.pointerEvents = 'auto';
                scrollArea.style.overscrollBehavior = 'contain';
                scrollArea.addEventListener('wheel', (e) => { e.stopPropagation(); }, { passive: true });
                scrollArea.addEventListener('touchmove', (e) => { e.stopPropagation(); }, { passive: true });
            }

            setTimeout(() => {
                overlay.classList.add('active');
                drawer.classList.add('active');
            }, 10);

            activeDrawer = { overlay, drawer };

            if (isProperty) {
                attachDrawerEvents();
            }
        }

        function compressImage(file) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width, height = img.height;
                    const maxDim = 800;
                    if (width > height && width > maxDim) { height = (height * maxDim) / width; width = maxDim; }
                    else if (height > maxDim) { width = (width * maxDim) / height; height = maxDim; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    canvas.toBlob((blob) => {
                        if (blob && blob.size > 0) {
                            const reader = new FileReader();
                            reader.onload = () => resolve(reader.result);
                            reader.readAsDataURL(blob);
                        } else {
                            canvas.toBlob((blob2) => { const reader = new FileReader(); reader.onload = () => resolve(reader.result); reader.readAsDataURL(blob2); }, 'image/jpeg', 0.5);
                        }
                    }, 'image/webp', 0.5);
                };
                img.onerror = reject;
                img.src = URL.createObjectURL(file);
            });
        }

        async function savePropertyFromDrawer() {
            const name = document.getElementById('propName')?.value?.trim();
            const location = document.getElementById('propLocation')?.value;
            const price = parseInt(document.getElementById('propPrice')?.value);
            const description = document.getElementById('propDesc')?.value;
            const bedrooms = parseInt(document.getElementById('propBedrooms')?.value) || 3;
            const bathrooms = parseFloat(document.getElementById('propBathrooms')?.value) || 2;
            const parking = parseInt(document.getElementById('propParking')?.value) || 2;
            const buildSize = parseInt(document.getElementById('propBuildSize')?.value) || 280;
            if (!name) { showToast('El nombre es obligatorio'); return; }
            if (!price || isNaN(price)) { showToast('El precio es obligatorio'); return; }

            let finalImages;
            if (pendingImagesArray.length) {
                finalImages = pendingImagesArray.map(img => ({ src: img.src, category: img.category }));
            } else {
                finalImages = (currentEditProperty?.images || []).map(img => ({ src: img.src, category: img.category }));
            }
            if (finalImages.length < 3) { showToast('Se requieren mínimo 3 imágenes'); return; }

            const processedImages = [];
            for (let i = 0; i < finalImages.length; i++) {
                const img = finalImages[i];
                if (img.src && img.src.startsWith('data:')) {
                    const imgId = `prop_${currentEditProperty ? currentEditProperty.id : 'new'}_${Date.now()}_${i}_${Math.random().toString(36).slice(2,8)}`;
                    await storeImageInDB(imgId, img.src);
                    processedImages.push({ src: imgId, category: img.category });
                } else {
                    processedImages.push({ src: img.src, category: img.category });
                }
            }

            const newPropId = currentEditProperty ? currentEditProperty.id : `prop_${Date.now()}_${Math.random().toString(36).slice(2,10)}`;
            const newProp = {
                id: newPropId,
                name, location, price, description, bedrooms, bathrooms, parking,
                buildSize, landSize: 500,
                images: processedImages,
                amenities: currentEditProperty ? (currentEditProperty.amenities || ['Jardín privado', 'Cocina integral', 'Terraza', 'Alberca']) : ['Jardín privado', 'Cocina integral', 'Terraza panorámica', 'Alberca'],
                featured: currentEditProperty ? currentEditProperty.featured : false,
                status: 'disponible'
            };

            if (currentEditProperty) {
                const idx = properties.findIndex(p => p.id === currentEditProperty.id);
                if (idx !== -1) properties[idx] = newProp;
            } else { properties.push(newProp); }

            for (const img of processedImages) {
                if (!img.src.startsWith('data:') && !imageCache.has(img.src)) {
                    const dataUrl = await getImageFromDB(img.src);
                    if (dataUrl) imageCache.set(img.src, dataUrl);
                }
            }

            saveData();
            showToast('✅ Propiedad guardada correctamente');
            closeDrawer();
            render();
        }

        function attachDrawerEvents() {
            const dropzone = document.getElementById('dropzone');
            const fileInput = document.getElementById('fileInput');
            const previewContainer = document.getElementById('imagesPreview');

            function updatePreview() {
                if (!previewContainer) return;
                previewContainer.innerHTML = '';
                if (pendingImagesArray.length === 0) {
                    previewContainer.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--text-muted);font-size:13px;padding:10px 0;">Sin imágenes cargadas todavía</p>';
                    return;
                }
                pendingImagesArray.forEach((item, idx) => {
                    const div = document.createElement('div');
                    div.className = 'image-preview-item';
                    const srcDisplay = item.src && item.src.startsWith('data:') ? item.src : getImageSrc(item);
                    div.innerHTML = `<img src="${srcDisplay}" alt="Preview ${idx+1}">
                        <button class="remove-image" type="button" data-index="${idx}" title="Eliminar">✕</button>
                        <select class="image-category-select" data-index="${idx}">
                            ${IMAGE_CATEGORIES.map(cat => `<option value="${cat}" ${item.category === cat ? 'selected' : ''}>${cat}</option>`).join('')}
                        </select>
                        ${idx === 0 ? '<div style="position:absolute;bottom:20px;left:4px;background:rgba(198,161,91,0.9);color:white;font-size:8px;padding:2px 6px;border-radius:8px;font-weight:600;z-index:2;">Principal</div>' : ''}`;
                    previewContainer.appendChild(div);
                });
                previewContainer.querySelectorAll('.remove-image').forEach(btn => {
                    btn.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); const idx = parseInt(btn.dataset.index); pendingImagesArray.splice(idx, 1); updatePreview(); updateDropzoneLabel(); });
                });
                previewContainer.querySelectorAll('.image-category-select').forEach(select => {
                    select.addEventListener('change', (e) => {
                        const idx = parseInt(e.target.dataset.index);
                        if (pendingImagesArray[idx]) pendingImagesArray[idx].category = e.target.value;
                    });
                });
            }

            function updateDropzoneLabel() {
                if (!dropzone) return;
                const count = pendingImagesArray.length;
                if (count > 0) {
                    dropzone.innerHTML = `<div style="text-align:center;"><div style="font-size:24px;margin-bottom:6px;">✅</div><div style="font-weight:600;color:var(--gold-dark);">${count} imagen${count > 1 ? 'es' : ''} cargada${count > 1 ? 's' : ''}</div><div style="font-size:11px;color:var(--text-muted);margin-top:4px;">Haz clic o arrastra para agregar más</div></div>`;
                } else {
                    dropzone.innerHTML = `<div style="text-align:center;"><div style="font-size:24px;margin-bottom:6px;">📸</div><div style="font-weight:600;color:var(--gold-dark);">Arrastra o haz clic para subir</div><div style="font-size:11px;color:var(--text-muted);margin-top:4px;">Mínimo 3 imágenes · JPG, PNG, WEBP</div></div>`;
                }
            }

            if (dropzone) {
                dropzone.addEventListener('click', (e) => { e.preventDefault(); fileInput?.click(); });
                dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('drag-over'); });
                dropzone.addEventListener('dragleave', (e) => { if (!dropzone.contains(e.relatedTarget)) dropzone.classList.remove('drag-over'); });
                dropzone.addEventListener('drop', async (e) => { e.preventDefault(); dropzone.classList.remove('drag-over'); await handleFiles(Array.from(e.dataTransfer.files)); });
            }

            if (fileInput) { fileInput.addEventListener('change', async (e) => { await handleFiles(Array.from(e.target.files)); e.target.value = ''; }); }

            async function handleFiles(files) {
                const imageFiles = files.filter(f => f.type.startsWith('image/'));
                if (!imageFiles.length) { showToast('Solo se permiten imágenes (JPG, PNG, WEBP)'); return; }
                dropzone.innerHTML = '<div style="text-align:center;padding:10px;">⏳ Comprimiendo imágenes...</div>';
                try {
                    const compressed = await Promise.all(imageFiles.map(async file => {
                        const src = await compressImage(file);
                        return { src, category: 'fachada' };
                    }));
                    pendingImagesArray.push(...compressed);
                } catch (err) {
                    showToast('Error al procesar imágenes');
                    console.error(err);
                }
                updatePreview();
                updateDropzoneLabel();
            }

            updatePreview();
            updateDropzoneLabel();
        }

        }

        function renderCalculatorPage() { return `<div class="section-container" style="padding-top:110px;"><div class="section-header"><div class="section-label">Herramienta Financiera</div><h2 class="section-title">Calculadora <span class="text-gold">Hipotecaria</span></h2></div><div class="calculator-card"><div><label>💰 Precio (MXN)</label><input type="number" id="calcPrice" class="calculator-input" value="5000000" oninput="calculateMortgage()"></div><div><label>🏦 Enganche (%)</label><input type="number" id="calcDown" class="calculator-input" value="20" oninput="calculateMortgage()"></div><div><label>📈 Tasa Anual (%)</label><input type="number" id="calcRate" class="calculator-input" value="10.5" step="0.1" oninput="calculateMortgage()"></div><div><label>⏱️ Plazo (años)</label><input type="number" id="calcYears" class="calculator-input" value="20" oninput="calculateMortgage()"></div><div class="calculator-result" id="calcResult"><div class="monthly">$0</div><div>PAGO MENSUAL</div></div></div></div>`; }
        function renderFAQPage() { return `<div class="section-container" style="padding-top:110px;"><div class="section-header"><div class="section-label">Preguntas Frecuentes</div><h2 class="section-title">Resolvemos tus <span class="text-gold">dudas</span></h2></div><div class="faq-grid">${[{q:'¿Cómo inicio el proceso de compra?',a:'Agenda una consulta gratuita por WhatsApp.'},{q:'¿Ofrecen financiamiento?',a:'Sí, trabajamos con Infonavit, Cofinavit y bancos.'},{q:'¿Puedo agendar una visita virtual?',a:'Ofrecemos recorridos virtuales en vivo.'},{q:'¿Cuánto tiempo toma el proceso?',a:'Promedio de 30 a 45 días.'}].map(f=>`<div class="faq-item" onclick="this.classList.toggle('active')"><div class="faq-question"><span>${f.q}</span><span class="faq-icon">+</span></div><div class="faq-answer">${f.a}</div></div>`).join('')}</div><div style="text-align:center;margin-top:40px;"><button class="btn-gold-hero" onclick="openContactModal()"><i class="fab fa-whatsapp"></i> ¿Más dudas?</button></div></div>`; }

        function loadDevelopments() { const wrapper = document.getElementById('developmentsWrapper'); if(!wrapper) return; wrapper.innerHTML = developmentsData.map(d => `<div class="swiper-slide"><div class="development-card"><div class="development-image"><img src="${d.image}"></div><div class="development-content"><h3>${d.name}</h3><div class="development-location"><i class="fas fa-map-marker-alt"></i> ${d.location}</div><div class="development-price">${d.priceBase}</div><div class="development-features"><span><i class="fas fa-home"></i> ${properties.filter(p=>p.location===d.name).length} propiedades</span><span><i class="fas fa-shield-alt"></i> Seguridad 24/7</span></div><button class="btn-dev" onclick="navigateTo('catalog')">Ver propiedades</button></div></div></div>`).join(''); new Swiper('#developmentsSwiper', { slidesPerView: 1, spaceBetween: 20, loop: true, autoplay: { delay: 4000 }, pagination: { el: '.swiper-pagination' }, navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' }, breakpoints: { 768: { slidesPerView: 2 }, 1024: { slidesPerView: 3 } } }); }
        function loadPropertiesCarousel() { const wrapper = document.getElementById('propertiesCarouselWrapper'); if(!wrapper) return; const validProps = properties.filter(p => p.images && p.images.length > 0); const showProps = validProps.length >= 3 ? validProps.slice(0,6) : properties.slice(0,6); wrapper.innerHTML = showProps.map(p => `<div class="swiper-slide">${renderPropertyCard(p)}</div>`).join(''); new Swiper('#propertiesCarousel', { slidesPerView: 1, spaceBetween: 20, loop: true, autoplay: { delay: 3500 }, pagination: { el: '.swiper-pagination' }, navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' }, breakpoints: { 768: { slidesPerView: 2 }, 1024: { slidesPerView: 3 } } }); gsap.fromTo('.property-card', { opacity:0, y:40 }, { opacity:1, y:0, duration:0.7, stagger:0.15, scrollTrigger: { trigger: '#propertiesCarousel', start: 'top 90%' } }); }
        function loadTestimonials() { const wrapper = document.getElementById('testimonialsWrapper'); if(!wrapper) return; const testimonials = [ {name:'Familia Rodríguez',text:'Javier nos ayudó a encontrar la casa de nuestros sueños. Su profesionalismo fue invaluable.',image:'https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=100'}, {name:'Carlos Mendoza',text:'El proceso de compra fue increíblemente fluido. Javier es un verdadero experto.',image:'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=100'}, {name:'Ana Laura Vega',text:'No podría estar más feliz con mi nueva propiedad. Javier superó todas mis expectativas.',image:'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=100'}, {name:'Ricardo Sánchez',text:'Una experiencia de compra inigualable. Javier conoce el mercado como nadie.',image:'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=100'}, {name:'María Fernández',text:'Profesionalismo absoluto. Encontré la casa perfecta para mi familia.',image:'https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=100'} ]; wrapper.innerHTML = testimonials.map(t => `<div class="swiper-slide"><div class="testimonial-card"><div class="testimonial-header"><img src="${t.image}" class="testimonial-avatar"><div><div class="testimonial-name">${t.name}</div><div class="testimonial-stars">★★★★★</div></div></div><p class="testimonial-text">"${t.text}"</p></div></div>`).join(''); new Swiper('#testimonialsSwiper', { slidesPerView: 1, spaceBetween: 20, loop: true, speed: 4000, autoplay: { delay: 0, disableOnInteraction: false }, pagination: { el: '.swiper-pagination' }, navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' }, breakpoints: { 768: { slidesPerView: 2 }, 1024: { slidesPerView: 3 } } }); gsap.fromTo('.testimonial-card', { opacity:0, y:30 }, { opacity:1, y:0, duration:0.6, stagger:0.2, scrollTrigger: { trigger: '#testimonialsSwiper', start: 'top 80%' } }); }

        // ========== MODAL DE PROPIEDAD (SIN CAMBIOS) ==========
        function openPropertyModal(id) {
            const p = properties.find(x => x.id === id);
            if(!p) return;
            if (lenis) lenis.stop();

            const imagesToShow = (p.images && p.images.length > 0) ? p.images.map(img => getImageSrc(img)) : ['https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=800'];
            const modalHtml = `
            <div id="propertyModal" class="lightbox-overlay active" onclick="if(event.target===this) closeModal()">
                <div class="modal-container">
                    <button class="modal-close" onclick="closeModal()">✕</button>
                    <div class="modal-gallery">
                        <div class="swiper propertySwiperModal" style="width:100%; height:100%;">
                            <div class="swiper-wrapper">
                                ${imagesToShow.map(img => `<div class="swiper-slide"><img src="${img}" style="width:100%;height:100%;object-fit:cover;"></div>`).join('')}
                            </div>
                            <div class="swiper-pagination"></div>
                            <div class="swiper-button-next"></div>
                            <div class="swiper-button-prev"></div>
                        </div>
                    </div>
                    <div class="modal-details" data-lenis-prevent>
                        <div class="modal-property-name">${p.name}</div>
                        <div class="modal-property-price">$${p.price.toLocaleString('es-MX')} MXN</div>
                        <p class="modal-property-desc">${p.description}</p>
                        <div class="modal-specs-grid">
                            <div class="modal-spec-card"><i class="fas fa-ruler-combined"></i> <span>${p.buildSize} m²</span></div>
                            <div class="modal-spec-card"><i class="fas fa-bed"></i> <span>${p.bedrooms} recámaras</span></div>
                            <div class="modal-spec-card"><i class="fas fa-bath"></i> <span>${p.bathrooms} baños</span></div>
                            <div class="modal-spec-card"><i class="fas fa-car"></i> <span>${p.parking} cajones</span></div>
                        </div>
                        <div class="modal-amenities-title">Amenidades</div>
                        <div class="modal-amenities-list">
                            ${p.amenities.map(a => `<span class="modal-amenity-badge">${a}</span>`).join('')}
                        </div>
                        <button class="btn-gold-hero" style="width:100%; margin-top:8px;" onclick="openContactModal('${p.name}');closeModal();"><i class="fab fa-whatsapp"></i> Contactar por WhatsApp</button>
                    </div>
                </div>
            </div>`;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            new Swiper('.propertySwiperModal', { 
                slidesPerView: 1, 
                pagination: { el: '.swiper-pagination' }, 
                navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' } 
            });
        }

        function closeModal() { 
            document.getElementById('propertyModal')?.remove();
            if (lenis) lenis.start();
        }

        function calculateMortgage() { const price = parseFloat(document.getElementById('calcPrice')?.value)||5000000; const down = parseFloat(document.getElementById('calcDown')?.value)||20; const rate = parseFloat(document.getElementById('calcRate')?.value)||10.5; const years = parseFloat(document.getElementById('calcYears')?.value)||20; const loan = price*(1-down/100); const mr=rate/100/12; const n=years*12; let payment = mr>0?loan*(mr*Math.pow(1+mr,n))/(Math.pow(1+mr,n)-1):loan/n; const el=document.getElementById('calcResult'); if(el) el.innerHTML=`<div class="monthly">$${Math.round(payment).toLocaleString('es-MX')}</div><div>PAGO MENSUAL ESTIMADO</div>`; }
        function attachEvents() { if(currentPage === 'catalog') renderCatalogBanners(); if(currentPage === 'calculator') calculateMortgage(); if(currentPage === 'home') { loadDevelopments(); loadTestimonials(); loadPropertiesCarousel(); window.addEventListener('scroll', updateNavbarGlass); } else window.removeEventListener('scroll', updateNavbarGlass); }
        function animateEntrance() { if(!window.gsap) return; gsap.fromTo('.hero-content', { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.8, delay: 0.3 }); gsap.utils.toArray('.section-header').forEach(h => gsap.fromTo(h, { opacity: 0, y: 30 }, { opacity: 1, y: 0, duration: 0.7, scrollTrigger: { trigger: h, start: "top 85%" } })); }

        const cursorEl = document.getElementById('customCursor'), trailEl = document.getElementById('customCursorTrail');
        if(cursorEl && window.innerWidth >= 1024) {
            window.addEventListener('mousemove', (e) => { cursorEl.style.left = e.clientX + 'px'; cursorEl.style.top = e.clientY + 'px'; trailEl.style.left = e.clientX + 'px'; trailEl.style.top = e.clientY + 'px'; });
            document.querySelectorAll('a, button, .property-card').forEach(el => { el.addEventListener('mouseenter', () => { cursorEl.classList.add('hover'); trailEl.classList.add('hover'); }); el.addEventListener('mouseleave', () => { cursorEl.classList.remove('hover'); trailEl.classList.remove('hover'); }); });
        }

        window.addEventListener('scroll', () => { const navbar = document.getElementById('navbar'); if(navbar) window.scrollY > 50 ? navbar.classList.add('scrolled') : navbar.classList.remove('scrolled'); updateNavbarGlass(); });
        let progress = 0; const loaderInterval = setInterval(() => { progress += Math.random() * 20; if(progress >= 100) { progress = 100; clearInterval(loaderInterval); } document.getElementById('loaderBar')?.setAttribute('style', `width: ${Math.min(progress,100)}%`); }, 150);
        window.addEventListener('load', () => { setTimeout(() => { gsap.to('#luxuryLoader', { opacity: 0, duration: 0.8, onComplete: () => document.getElementById('luxuryLoader')?.remove() }); }, 500); });

        function handleMenuCloseButton() { const closeBtn = document.querySelector('.nav-links .close-menu'); if (!closeBtn) return; closeBtn.style.display = window.innerWidth <= 768 ? 'block' : 'none'; }
        window.addEventListener('resize', handleMenuCloseButton);
        handleMenuCloseButton();

        document.getElementById('whatsappFloat')?.addEventListener('click', () => openContactModal());
        document.getElementById('hamburger')?.addEventListener('click', () => document.getElementById('navLinks')?.classList.toggle('active'));

        document.addEventListener('click', (e) => { if(e.target.closest('#adminMenuToggle')) document.getElementById('adminSidebar')?.classList.toggle('open'); });

        (async function initApp() {
            try {
                await openDB();
                await loadAllImagesIntoCache();
                for (const p of properties) {
                    if (p.images && p.images.length && typeof p.images[0] === 'string') {
                        const migrated = [];
                        for (let i = 0; i < p.images.length; i++) {
                            const img = p.images[i];
                            if (img.src && img.src.startsWith('data:')) {
                                const imgId = `prop_${p.id}_legacy_${i}_${Date.now()}_${Math.random().toString(36).slice(2,8)}`;
                                await storeImageInDB(imgId, img.src);
                                migrated.push({ src: imgId, category: img.category });
                            } else { migrated.push(img); }
                        }
                        p.images = migrated;
                    }
                }
                saveData();

                if (authToken) {
                    try {
                        const [devs, props, lds] = await Promise.all([
                            apiRequest('/api/developments').catch(() => []),
                            apiRequest('/api/properties').catch(() => []),
                            apiRequest('/api/leads').catch(() => [])
                        ]);
                        if (Array.isArray(devs) && devs.length > 0) {
                            developmentsData = devs;
                            saveDevelopments();
                        }
                        if (Array.isArray(props) && props.length > 0) properties = props;
                        if (Array.isArray(lds) && lds.length > 0) leads = lds;
                        saveData();
                    } catch (e) { console.warn('Error cargando backend', e); }
                }
                ensureAllDevelopmentsHaveProperties();
                applySiteConfig();
                render();
            } catch (e) { console.warn('IndexedDB init error', e); }
        })();

        window.navigateTo = navigateTo; window.trackWhatsApp = trackWhatsApp; window.openContactModal = openContactModal; window.openPropertyModal = openPropertyModal; window.closeModal = closeModal;
        window.editPropertyDrawer = editPropertyDrawer; window.deleteProperty = deleteProperty; window.setAdminSection = setAdminSection; window.doLogin = doLogin;
        window.calculateMortgage = calculateMortgage; window.logoutAdmin = logoutAdmin; window.closeDrawer = closeDrawer; window.openDevelopment = openDevelopment;
        window.editDevelopmentDrawer = editDevelopmentDrawer; window.openAddPropertyDrawer = openAddPropertyDrawer; window.toggleWhatsappChat = toggleWhatsappChat;
        window.sendWhatsappMessage = sendWhatsappMessage; window.addNewDevelopment = addNewDevelopment; window.saveSiteConfig = saveSiteConfig;
        window.goBackToDevelopments = goBackToDevelopments;
        window.savePropertyFromDrawer = savePropertyFromDrawer;
        window.saveDevelopmentFromDrawer = saveDevelopmentFromDrawer;
        window.saveNewDevelopment = saveNewDevelopment;
        window.deleteLead = deleteLead;
        window.submitContactForm = submitContactForm;

        render();
    </script>
</body>
</html>
